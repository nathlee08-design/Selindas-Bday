<!DOCTYPE html>
<html>
<head>
<title>Details ✨</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="neon-bg">

<div class="container">

<h1>📍 Venue Details</h1>

<div class="venue-details">
  <h3>Tiger Korean Pocha</h3>
  <p>📍 Haymarket</p>
  <p><strong>⏰ Time: 5:30pm</strong></p>
</div>

<iframe
width="100%"
height="300"
style="border:0"
loading="lazy"
src="https://www.google.com/maps?q=Tiger%20Korean%20Pocha%20Haymarket&output=embed">
</iframe>

<h2>👗 What to wear</h2>
<p>Dress code will unlock after secret access 👀</p>

<!-- Secret access area: input + button placed UNDER the map -->
<div id="secret-access">
  <!-- This placeholder is shown when user hasn't pressed Yes on the first page -->
  <div id="secret-placeholder">Press Yes on the previous page to reveal the secret code input.</div>

  <!-- The actual input/button — hidden by default and revealed when consent exists -->
  <div id="secret-input-area" style="display:none; margin-top:1rem;">
    <label for="secret-code">Enter invite code:</label>
    <input id="secret-code" type="text" placeholder="Enter code" />
    <button onclick="verifySecretCode()">Unlock</button>

    <div id="secret-message" style="display:none; margin-top:0.5rem;"></div>

    <!-- Dress code section revealed after successful code -->
    <div id="dress-code-section" style="display:none; margin-top:1rem;">
      <div class="dress-code">
        <h3>SECRET: Wear CROCS 👟</h3>
        <p>We must match Selinda on the day 😂</p>
      </div>
    </div>
  </div>
</div>

</div>

<!-- confetti library (needed by script.js) -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<!-- main site script -->
<script src="script.js"></script>

<script>
// Function to show/hide secret input area
function updateSecretDisplay() {
  var consent = sessionStorage.getItem('selindaConsent') || localStorage.getItem('selindaConsent');
  var inputArea = document.getElementById('secret-input-area');
  var placeholder = document.getElementById('secret-placeholder');

  if (consent === 'yes') {
    // User pressed Yes on the first page — show the secret input
    if (inputArea) inputArea.style.display = 'block';
    if (placeholder) placeholder.style.display = 'none';
  } else {
    // Keep the input hidden
    if (inputArea) inputArea.style.display = 'none';
    if (placeholder) placeholder.style.display = 'block';
  }
}

// Run on page load
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', updateSecretDisplay);
} else {
  updateSecretDisplay();
}

// Also run after a short delay to ensure DOM is fully ready
setTimeout(updateSecretDisplay, 100);
</script>

</body>
</html>
